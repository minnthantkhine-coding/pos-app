name: Build & Deploy — Dev

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate Version Tag
        id: tag-version
        run: echo "version=${{ github.run_number }}-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deployment/Dockerfile.dev
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/minnthantkhine-coding/pos-app:${{ steps.tag-version.outputs.version }}
            ghcr.io/minnthantkhine-coding/pos-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
