name: Build & Deploy — Dev

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6 # Updated to natively support Node 24

      - name: Build tag version
        id: tag-version
        run: echo "version=${{ github.run_number }}-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4 # Updated from v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4 # Updated from v3

      - name: Login to ghcr.io
        uses: docker/login-action@v4 # Updated from v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v7 # Updated from v5
        with:
          context: .
          file: ./deployment/Dockerfile.dev
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/minnthantkhine-coding/pos-app:${{ steps.tag-version.outputs.version }}

